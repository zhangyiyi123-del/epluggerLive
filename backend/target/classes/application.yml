# EPlugger 后端配置 — 与 quickstart.md 对齐
# 本地运行前：MySQL 已启动，已建库 eplugger。下面用 root 连接（可按需改为 eplugger 用户）

spring:
  application:
    name: eplugger-backend
  datasource:
    url: jdbc:mysql://localhost:3306/eplugger?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: eplugger
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

# JWT（阶段二）
app:
  jwt:
    # HMAC-SHA256 要求密钥至少 32 字节；未设 JWT_SECRET 时使用下述默认（仅开发）
    secret: ${JWT_SECRET:eplugger-dev-jwt-secret-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://172.16.*.*:5173,http://192.168.*.*:3000}
  upload:
    dir: ${UPLOAD_DIR:./upload}
    max-per-request: 3
    max-file-size: 5MB

server:
  port: 8080
  address: 0.0.0.0  # 关键：绑定所有地址，而非仅localhost
